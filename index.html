<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Узнай, что тебе мешает зарабатывать больше</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#132420;
    --bg-deep:#0d1a17;
    --card:#1b332c;
    --card-hover:#20392f;
    --line:#2c4740;
    --gold:#cba35c;
    --gold-soft:#e8d3a4;
    --text:#f3efe4;
    --text-dim:#9db0a6;
    --text-faint:#6f8479;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Work Sans', sans-serif;
    line-height:1.6;
  }
  .wrap{
    max-width:680px;
    margin:0 auto;
    padding:48px 24px 80px;
  }
  .eyebrow{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 14px;
    font-weight:600;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(28px,5vw,38px);
    line-height:1.2;
    margin:0 0 16px;
    color:var(--text);
  }
  .sub{
    color:var(--text-dim);
    font-size:16px;
    margin:0 0 36px;
    max-width:52ch;
  }
  .progress-track{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--bg);
    padding:14px 0 20px;
    margin-bottom:8px;
  }
  .progress-bar{
    height:3px;
    background:var(--line);
    border-radius:2px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:var(--gold);
    transition:width .35s ease;
  }
  .progress-label{
    font-size:13px;
    color:var(--text-faint);
    margin-top:8px;
  }
  .question{
    padding:32px 0;
    border-top:1px solid var(--line);
  }
  .question:first-of-type{border-top:1px solid var(--line);}
  .q-num{
    font-family:'Fraunces', serif;
    font-size:14px;
    color:var(--gold);
    margin-bottom:10px;
    font-weight:500;
  }
  .q-text{
    font-size:18px;
    font-weight:500;
    margin:0 0 20px;
    color:var(--text);
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    display:flex;
    align-items:flex-start;
    gap:14px;
    padding:14px 16px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .option:hover{background:var(--card-hover);}
  .option input{
    appearance:none;
    -webkit-appearance:none;
    width:18px;
    height:18px;
    min-width:18px;
    border-radius:50%;
    border:1.5px solid var(--text-faint);
    margin-top:2px;
    position:relative;
    cursor:pointer;
  }
  .option input:checked{
    border-color:var(--gold);
  }
  .option input:checked::after{
    content:'';
    position:absolute;
    top:3px;
    left:3px;
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--gold);
  }
  .option.selected{
    border-color:var(--gold);
    background:rgba(203,163,92,0.08);
  }
  .option span{
    font-size:15px;
    color:var(--text);
  }
  .cta-row{
    margin-top:40px;
    text-align:center;
  }
  button.submit{
    font-family:'Work Sans', sans-serif;
    font-size:16px;
    font-weight:600;
    color:var(--bg-deep);
    background:var(--gold);
    border:none;
    padding:15px 36px;
    border-radius:999px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  button.submit:hover{background:var(--gold-soft);}
  button.submit:active{transform:scale(0.98);}
  button.submit:disabled{
    background:var(--line);
    color:var(--text-faint);
    cursor:not-allowed;
  }
  .hint{
    font-size:13px;
    color:var(--text-faint);
    margin-top:12px;
  }
  #quiz.hidden, #result.hidden{display:none;}
  #result{
    padding-top:12px;
  }
  .result-eyebrow{
    font-size:13px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 12px;
    font-weight:600;
  }
  .result-title{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(26px,5vw,34px);
    line-height:1.25;
    margin:0 0 24px;
    color:var(--text);
  }
  .profile-wrap{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:18px 20px;
    margin:0 0 28px;
  }
  .profile-caption{
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 14px;
    font-weight:600;
  }
  .profile-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
  }
  .profile-row:last-child{margin-bottom:0;}
  .profile-label{
    font-size:13px;
    color:var(--text-dim);
    width:150px;
    min-width:150px;
    flex-shrink:0;
  }
  .profile-row.is-winner .profile-label{
    color:var(--gold-soft);
    font-weight:600;
  }
  .profile-track{
    flex:1;
    height:6px;
    background:var(--line);
    border-radius:4px;
    overflow:hidden;
  }
  .profile-fill{
    height:100%;
    background:var(--text-faint);
    border-radius:4px;
  }
  .profile-row.is-winner .profile-fill{
    background:var(--gold);
  }
  .profile-pct{
    font-size:13px;
    color:var(--text-faint);
    width:36px;
    text-align:right;
    flex-shrink:0;
  }
  .profile-row.is-winner .profile-pct{
    color:var(--gold-soft);
    font-weight:600;
  }
  .secondary-note{
    font-size:14px;
    color:var(--text-dim);
    margin:0 0 24px;
    padding:12px 16px;
    background:rgba(203,163,92,0.06);
    border-radius:8px;
  }
  .result-body p{
    color:var(--text-dim);
    font-size:16px;
    margin:0 0 18px;
  }
  .result-tip{
    background:var(--card);
    border-left:3px solid var(--gold);
    border-radius:0 10px 10px 0;
    padding:18px 20px;
    margin:24px 0;
  }
  .result-tip p{
    margin:0;
    color:var(--text);
    font-size:15px;
  }
  .result-tip .tip-label{
    display:block;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
    font-weight:600;
  }
  .cta-block{
    margin-top:36px;
    padding:28px 24px;
    background:var(--card);
    border-radius:14px;
    text-align:center;
  }
  .cta-block p{
    color:var(--text-dim);
    font-size:15px;
    margin:0 0 18px;
  }
  .cta-block .code{
    color:var(--gold-soft);
    font-weight:600;
  }
  .cta-link{
    display:inline-block;
    margin-top:4px;
    padding:14px 32px;
    background:var(--gold);
    color:var(--bg-deep);
    font-weight:600;
    font-size:15px;
    text-decoration:none;
    border-radius:999px;
    transition:background .15s ease, transform .1s ease;
  }
  .cta-link:hover{background:var(--gold-soft);}
  .cta-link:active{transform:scale(0.98);}
  .restart{
    display:block;
    margin:28px auto 0;
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:14px;
    text-decoration:underline;
    cursor:pointer;
  }
  .restart:hover{color:var(--text-dim);}
</style>
</head>
<body>
<div class="wrap">

  <div id="quiz">
    <p class="eyebrow">Тест · 2 минуты</p>
    <h1>Узнай, что тебе мешает зарабатывать больше</h1>
    <p class="sub">10 вопросов. Отвечай честно и по первому ощущению — так результат будет точнее.</p>

    <div class="progress-track">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-label" id="progressLabel">Отвечено: 0 из 10</p>
    </div>

    <div id="questionsList"></div>

    <div class="cta-row">
      <button class="submit" id="submitBtn" disabled>Узнать результат</button>
      <p class="hint" id="hintText">Ответь на все вопросы, чтобы увидеть результат</p>
    </div>
  </div>

  <div id="result" class="hidden"></div>

</div>

<script>
const questions = [
  {
    q: "Как бы ты описал свою текущую ситуацию с доходом?",
    options: [
      ["A", "Нет стабильного дохода — только начинаю новое дело или ищу/пробую себя на новой должности"],
      ["B", "Доход есть, но нестабилен, или я живу в постоянной тревоге, что его не будет"],
      ["C", "Доход стабилен, но упрямо не растёт — застрял на одной сумме уже давно"],
      ["D", "Доход хороший и растёт, но я чувствую, что готов к качественно новому уровню"]
    ]
  },
  {
    q: "Что ты чувствуешь, когда думаешь о том, чтобы попросить больше — будь то повышение цены на свои услуги, прибавку к зарплате или новую должность?",
    options: [
      ["A", "Страх, что мне откажут или это вообще не сработает"],
      ["B", "Тревогу: вдруг станет только хуже, если начну что-то менять"],
      ["C", "Внутренний тормоз — будто «мне нельзя большего», хотя разумных причин для этого нет"],
      ["D", "Спокойно называю свою ценность — было непросто научиться, но страх уже почти не мешает"]
    ]
  },
  {
    q: "Как ты относишься к тому, чтобы быть на виду — проявляться, показывать свои результаты (в соцсетях, на работе, перед руководством)?",
    options: [
      ["A", "Боюсь начать и не знаю, с чего заходить"],
      ["B", "То проявляюсь активно, то на время будто исчезаю"],
      ["C", "Делаю это по минимуму — избегаю показывать себя, свои результаты и достижения"],
      ["D", "Уже спокойно проявляюсь — этот страх я в основном проработал, дело за новыми масштабами"]
    ]
  },
  {
    q: "Что происходит, когда приходит крупная сумма денег (премия, гонорар, оплата)?",
    options: [
      ["A", "Радуюсь, но не понимаю, как сделать так, чтобы это повторялось"],
      ["B", "Тревога — кажется, что это скоро закончится"],
      ["C", "Быстро «утилизирую» деньги куда-то, будто не могу разрешить себе иметь много"],
      ["D", "Спокойно распределяю — умею и порадовать себя, и приумножить"]
    ]
  },
  {
    q: "Какая мысль про деньги или работу крутится в голове чаще всего?",
    options: [
      ["A", "«Хочу начать зарабатывать больше, но не знаю как»"],
      ["B", "«Опять то густо, то пусто — когда это уже кончится»"],
      ["C", "«Почему я не могу пробить потолок, хотя всё делаю правильно»"],
      ["D", "«Я много проработал внутри, теперь хочу перейти на следующий уровень дохода»"]
    ]
  },
  {
    q: "Как ты реагируешь, когда кто-то из твоего окружения зарабатывает заметно больше тебя?",
    options: [
      ["A", "Восхищение и растерянность — как у них получается"],
      ["B", "Смешанные чувства: рада за них, но тревожусь за свою нестабильность"],
      ["C", "Раздражение на себя — у меня есть всё для этого, но что-то держит"],
      ["D", "Интерес и азарт — присматриваюсь, как перенять полезное для своего следующего шага"]
    ]
  },
  {
    q: "Что происходит в теле, когда думаешь о крупной цифре дохода?",
    options: [
      ["A", "Волнение и неуверенность"],
      ["B", "Напряжение — будто жду подвоха"],
      ["C", "Зажим, будто «нельзя», хотя объяснить причину не могу"],
      ["D", "В основном спокойствие — иногда лёгкое волнение, но оно уже не останавливает"]
    ]
  },
  {
    q: "Как давно ты думаешь о смене работы, ниши, должности или формата дохода — но не решаешься?",
    options: [
      ["A", "Постоянно думаю, но боюсь сделать первый шаг"],
      ["B", "Периодически — когда особенно тяжело, а потом снова терплю"],
      ["C", "Думаю давно, годами — но «привычное» удерживает сильнее, чем хочется признавать"],
      ["D", "Я уже прошёл через смену/трансформацию — теперь ищу, как выйти на новый масштаб"]
    ]
  },
  {
    q: "Что для тебя сейчас самое трудное в теме денег?",
    options: [
      ["A", "Начать действовать и поверить, что у меня получится"],
      ["B", "Перестать бояться, что всё снова обрушится"],
      ["C", "Разрешить себе больше и снять невидимый потолок"],
      ["D", "Найти следующую опору для роста — базовые страхи я уже во многом прошёл"]
    ]
  },
  {
    q: "Если бы денежный блок исчез уже завтра, что изменилось бы в первую очередь?",
    options: [
      ["A", "Появилась бы уверенность и первые результаты в новом деле"],
      ["B", "Доход стал бы стабильным, без качелей и тревоги"],
      ["C", "Доход вырос бы кратно, не упираясь в потолок"],
      ["D", "Я бы уверенно перешёл на новый уровень масштаба — без внутренних тормозов"]
    ]
  }
];

const results = {
  A: {
    eyebrow: "Твой результат",
    title: "Тебе мешает страх первого шага",
    body: [
      "Дело обычно не в нехватке уверенности или навыков — это скорее следствие, а не причина. В основе часто лежит негласное правило «сначала нужно заслужить право хотеть больше»: получить ещё один диплом, набрать портфолио, дождаться идеального момента. Это правило редко произносится вслух, но именно оно решает, когда «уже можно».",
      "На практике это часто выглядит так: у человека уже есть первый результат — клиент, идея, черновик — но он обесценивается словами «это не считается, это ещё не по-настоящему». Планка незаметно отодвигается каждый раз, когда до неё почти дотягиваются — поэтому кажется, что не сдвинулся с места, хотя на самом деле шаги уже были."
    ],
    tip: "Выпиши 5 своих сильных сторон — без «но» и обесценивания. Это первый шаг к тому, чтобы увидеть ресурс, который у тебя уже есть."
  },
  B: {
    eyebrow: "Твой результат",
    title: "Тебе мешает тревога за стабильность",
    body: [
      "Тревога за деньги редко на самом деле про деньги. Чаще она про давно знакомое телу ощущение непредсказуемости — когда в детстве настроение в доме или атмосфера зависели от того, «как сегодня с деньгами». Тогда психика один раз решила: расслабляться, когда всё хорошо, — опасно, потому что хорошо не остаётся надолго.",
      "Отсюда парадокс: чем стабильнее становится доход, тем тревожнее — потому что психика ждёт подвоха именно в момент затишья. На практике это выглядит так: крупная сумма приходит — и почти сразу появляется импульс её куда-то пристроить, забронировать, потратить, лишь бы она не «лежала и провоцировала» тревогу."
    ],
    tip: "В следующий раз, когда почувствуешь тревогу за деньги, вместо привычного «опять всё пропало» — задай себе вопрос: «когда в жизни я в последний раз чувствовал, что иметь стабильно — небезопасно?». Просто заметь ответ."
  },
  C: {
    eyebrow: "Твой результат",
    title: "Тебе мешает невидимый потолок",
    body: [
      "Финансовый потолок редко держится на нехватке стратегии — обычно стратегий испробовано уже с избытком. Куда чаще за ним стоит негласная лояльность конкретному человеку: маме, старшему коллеге, бывшему руководителю. Где-то внутри есть ощущение, что обойти его по доходу — почти предательство.",
      "Это можно заметить в конкретный момент: прямо перед тем, как назвать цену, отправить смелое предложение или попросить повышение — возникает едва уловимое торможение, будто кто-то невидимый должен одобрить этот шаг. Оно длится секунду, но именно в ней обычно рождается «наверное, потом» вместо «да, сейчас»."
    ],
    tip: "Вспомни 3 ситуации за последний месяц, где можно было попросить больше — но ты промолчал(а) или снизил(а) планку сам(а). Напиши рядом с каждой одним словом, что тебя остановило в тот момент («неудобно», «а вдруг откажут», «не вовремя»...). Не анализируй — просто зафиксируй. Уже сам список покажет закономерность."
  },
  D: {
    eyebrow: "Твой результат",
    title: "Ты готов к новому уровню дохода",
    body: [
      "На этом этапе тормозит уже не страх — с базовыми блоками ты по большей части разобрался. Чаще здесь мешает противоположная вещь: слишком много одновременно хороших направлений, и энергия распыляется между ними вместо того, чтобы сконцентрироваться в одном. Рост на этом уровне требует не смелости, а точного ограничения — сузить фокус, а не расширить список идей.",
      "Здесь также часто работает эффект знакомого потолка: даже когда объективных препятствий больше нет, психика какое-то время продолжает вести себя так, будто прежний уровень дохода — это максимум, просто по инерции, а не по факту."
    ],
    tip: "Выпиши свой текущий потолок дохода в цифрах — и рядом сумму, которая была бы качественным следующим уровнем. Посмотри, какого одного конкретного действия не хватает между этими двумя цифрами."
  }
};

const profileLabels = {
  A: "Страх первого шага",
  B: "Тревога за стабильность",
  C: "Невидимый потолок",
  D: "Готовность к росту"
};

const answers = {};
const listEl = document.getElementById('questionsList');

questions.forEach((item, qi) => {
  const qDiv = document.createElement('div');
  qDiv.className = 'question';
  qDiv.innerHTML = `
    <p class="q-num">Вопрос ${qi + 1} из ${questions.length}</p>
    <p class="q-text">${item.q}</p>
    <div class="options"></div>
  `;
  const optsDiv = qDiv.querySelector('.options');
  item.options.forEach(([letter, text], oi) => {
    const label = document.createElement('label');
    label.className = 'option';
    label.innerHTML = `<input type="radio" name="q${qi}" value="${letter}"><span>${text}</span>`;
    label.addEventListener('click', () => {
      answers[qi] = letter;
      optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      label.classList.add('selected');
      updateProgress();
    });
    optsDiv.appendChild(label);
  });
  listEl.appendChild(qDiv);
});

function updateProgress(){
  const count = Object.keys(answers).length;
  const pct = Math.round((count / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Отвечено: ${count} из ${questions.length}`;
  const btn = document.getElementById('submitBtn');
  const hint = document.getElementById('hintText');
  if (count === questions.length){
    btn.disabled = false;
    hint.textContent = 'Готово — можно смотреть результат';
  } else {
    btn.disabled = true;
    hint.textContent = 'Ответь на все вопросы, чтобы увидеть результат';
  }
}

document.getElementById('submitBtn').addEventListener('click', () => {
  const tally = {A:0, B:0, C:0, D:0};
  Object.values(answers).forEach(letter => tally[letter]++);
  let winner = 'A';
  let max = -1;
  ['A','B','C','D'].forEach(letter => {
    if (tally[letter] > max){ max = tally[letter]; winner = letter; }
  });
  showResult(winner, tally);
});

function showResult(winner, tally){
  const r = results[winner];
  const total = 10;
  const order = ['A','B','C','D'].slice().sort((a,b) => tally[b] - tally[a]);

  const profileHtml = order.map(letter => {
    const pct = Math.round((tally[letter] / total) * 100);
    const isWinner = letter === winner;
    return `
      <div class="profile-row ${isWinner ? 'is-winner' : ''}">
        <span class="profile-label">${profileLabels[letter]}</span>
        <span class="profile-track"><span class="profile-fill" style="width:${pct}%"></span></span>
        <span class="profile-pct">${pct}%</span>
      </div>`;
  }).join('');

  const second = order[1];
  let secondaryHtml = '';
  if (tally[second] >= 3 && tally[winner] - tally[second] <= 2) {
    secondaryHtml = `<p class="secondary-note">Заметно и второе по силе направление — «${profileLabels[second]}». На практике блоки редко идут по одному, и это сочетание часто важно учитывать в работе.</p>`;
  }

  const bodyHtml = r.body.map(p => `<p>${p}</p>`).join('');
  document.getElementById('result').innerHTML = `
    <p class="result-eyebrow">${r.eyebrow}</p>
    <h2 class="result-title">${r.title}</h2>
    <div class="profile-wrap">
      <p class="profile-caption">Твой профиль по всем 10 ответам</p>
      ${profileHtml}
    </div>
    ${secondaryHtml}
    <div class="result-body">${bodyHtml}</div>
    <div class="result-tip">
      <span class="tip-label">Что можно сделать уже сейчас</span>
      <p>${r.tip}</p>
    </div>
    <div class="cta-block">
      <p>Узнать свой блок — это уже половина пути. Вторая половина — разобрать именно твою ситуацию и понять, что конкретно с ней делать.</p>
      <p>Напиши мне в личные сообщения слово <span class="code">«ВАСЕК»</span> — и я отправлю тебе чек-лист «ТОП 10 упражнений для повышения твоей эффективности».</p>
      <a class="cta-link" href="https://vk.ru/nikitina_neiro" target="_blank" rel="noopener">Написать в личные сообщения</a>
    </div>
    <button class="restart" id="restartBtn">Пройти тест заново</button>
  `;
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  window.scrollTo({top: 0, behavior: 'smooth'});
  document.getElementById('restartBtn').addEventListener('click', () => {
    Object.keys(answers).forEach(k => delete answers[k]);
    document.querySelectorAll('input[type=radio]').forEach(i => i.checked = false);
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    updateProgress();
    document.getElementById('result').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
}
</script>
</body>
</html>
