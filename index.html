<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Узнай, что тебе мешает зарабатывать больше</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#132420;
    --bg-deep:#0d1a17;
    --card:#1b332c;
    --card-hover:#20392f;
    --line:#2c4740;
    --gold:#cba35c;
    --gold-soft:#e8d3a4;
    --text:#f3efe4;
    --text-dim:#9db0a6;
    --text-faint:#6f8479;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Work Sans', sans-serif;
    line-height:1.6;
  }
  .wrap{
    max-width:680px;
    margin:0 auto;
    padding:48px 24px 80px;
  }
  .eyebrow{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 14px;
    font-weight:600;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(28px,5vw,38px);
    line-height:1.2;
    margin:0 0 16px;
    color:var(--text);
  }
  .sub{
    color:var(--text-dim);
    font-size:16px;
    margin:0 0 36px;
    max-width:52ch;
  }
  .progress-track{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--bg);
    padding:14px 0 20px;
    margin-bottom:8px;
  }
  .progress-bar{
    height:3px;
    background:var(--line);
    border-radius:2px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:var(--gold);
    transition:width .35s ease;
  }
  .progress-label{
    font-size:13px;
    color:var(--text-faint);
    margin-top:8px;
  }
  .question{
    padding:32px 0;
    border-top:1px solid var(--line);
  }
  .question:first-of-type{border-top:1px solid var(--line);}
  .q-num{
    font-family:'Fraunces', serif;
    font-size:14px;
    color:var(--gold);
    margin-bottom:10px;
    font-weight:500;
  }
  .q-text{
    font-size:18px;
    font-weight:500;
    margin:0 0 20px;
    color:var(--text);
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    display:flex;
    align-items:flex-start;
    gap:14px;
    padding:14px 16px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .option:hover{background:var(--card-hover);}
  .option input{
    appearance:none;
    -webkit-appearance:none;
    width:18px;
    height:18px;
    min-width:18px;
    border-radius:50%;
    border:1.5px solid var(--text-faint);
    margin-top:2px;
    position:relative;
    cursor:pointer;
  }
  .option input:checked{
    border-color:var(--gold);
  }
  .option input:checked::after{
    content:'';
    position:absolute;
    top:3px;
    left:3px;
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--gold);
  }
  .option.selected{
    border-color:var(--gold);
    background:rgba(203,163,92,0.08);
  }
  .option span{
    font-size:15px;
    color:var(--text);
  }
  .cta-row{
    margin-top:40px;
    text-align:center;
  }
  button.submit{
    font-family:'Work Sans', sans-serif;
    font-size:16px;
    font-weight:600;
    color:var(--bg-deep);
    background:var(--gold);
    border:none;
    padding:15px 36px;
    border-radius:999px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  button.submit:hover{background:var(--gold-soft);}
  button.submit:active{transform:scale(0.98);}
  button.submit:disabled{
    background:var(--line);
    color:var(--text-faint);
    cursor:not-allowed;
  }
  .hint{
    font-size:13px;
    color:var(--text-faint);
    margin-top:12px;
  }
  #quiz.hidden, #result.hidden{display:none;}
  #result{
    padding-top:12px;
  }
  .result-eyebrow{
    font-size:13px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 12px;
    font-weight:600;
  }
  .result-title{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(26px,5vw,34px);
    line-height:1.25;
    margin:0 0 28px;
    color:var(--text);
  }
  .result-body p{
    color:var(--text-dim);
    font-size:16px;
    margin:0 0 18px;
  }
  .result-tip{
    background:var(--card);
    border-left:3px solid var(--gold);
    border-radius:0 10px 10px 0;
    padding:18px 20px;
    margin:24px 0;
  }
  .result-tip p{
    margin:0;
    color:var(--text);
    font-size:15px;
  }
  .result-tip .tip-label{
    display:block;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
    font-weight:600;
  }
  .cta-block{
    margin-top:36px;
    padding:28px 24px;
    background:var(--card);
    border-radius:14px;
    text-align:center;
  }
  .cta-block p{
    color:var(--text-dim);
    font-size:15px;
    margin:0 0 18px;
  }
  .cta-block .code{
    color:var(--gold-soft);
    font-weight:600;
  }
  .cta-link{
    display:inline-block;
    margin-top:4px;
    padding:14px 32px;
    background:var(--gold);
    color:var(--bg-deep);
    font-weight:600;
    font-size:15px;
    text-decoration:none;
    border-radius:999px;
    transition:background .15s ease, transform .1s ease;
  }
  .cta-link:hover{background:var(--gold-soft);}
  .cta-link:active{transform:scale(0.98);}
  .restart{
    display:block;
    margin:28px auto 0;
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:14px;
    text-decoration:underline;
    cursor:pointer;
  }
  .restart:hover{color:var(--text-dim);}
</style>
</head>
<body>
<div class="wrap">

  <div id="quiz">
    <p class="eyebrow">Тест · 2 минуты</p>
    <h1>Узнай, что тебе мешает зарабатывать больше</h1>
    <p class="sub">10 вопросов. Отвечай честно и по первому ощущению — так результат будет точнее.</p>

    <div class="progress-track">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-label" id="progressLabel">Отвечено: 0 из 10</p>
    </div>

    <div id="questionsList"></div>

    <div class="cta-row">
      <button class="submit" id="submitBtn" disabled>Узнать результат</button>
      <p class="hint" id="hintText">Ответь на все вопросы, чтобы увидеть результат</p>
    </div>
  </div>

  <div id="result" class="hidden"></div>

</div>

<script>
const questions = [
  {
    q: "Как бы ты описала свою текущую ситуацию с доходом?",
    options: [
      ["A", "Нет стабильного дохода — только начинаю новое дело или ищу/пробую себя на новой должности"],
      ["B", "Доход есть, но нестабилен, или я живу в постоянной тревоге, что его не будет"],
      ["C", "Доход стабилен, но упрямо не растёт — застряла на одной сумме уже давно"]
    ]
  },
  {
    q: "Что ты чувствуешь, когда думаешь о том, чтобы попросить больше — будь то повышение цены на свои услуги, прибавку к зарплате или новую должность?",
    options: [
      ["A", "Страх, что мне откажут или это вообще не сработает"],
      ["B", "Тревогу: вдруг станет только хуже, если начну что-то менять"],
      ["C", "Внутренний тормоз — будто «мне нельзя большего», хотя разумных причин для этого нет"]
    ]
  },
  {
    q: "Как ты относишься к тому, чтобы быть на виду — проявляться, показывать свои результаты (в соцсетях, на работе, перед руководством)?",
    options: [
      ["A", "Боюсь начать и не знаю, с чего заходить"],
      ["B", "То проявляюсь активно, то на время будто исчезаю"],
      ["C", "Делаю это по минимуму — избегаю показывать себя, свои результаты и достижения"]
    ]
  },
  {
    q: "Что происходит, когда приходит крупная сумма денег (премия, гонорар, оплата)?",
    options: [
      ["A", "Радуюсь, но не понимаю, как сделать так, чтобы это повторялось"],
      ["B", "Тревога — кажется, что это скоро закончится"],
      ["C", "Быстро «утилизирую» деньги куда-то, будто не могу разрешить себе иметь много"]
    ]
  },
  {
    q: "Какая мысль про деньги или работу крутится в голове чаще всего?",
    options: [
      ["A", "«Хочу начать зарабатывать больше, но не знаю как»"],
      ["B", "«Опять то густо, то пусто — когда это уже кончится»"],
      ["C", "«Почему я не могу пробить потолок, хотя всё делаю правильно»"]
    ]
  },
  {
    q: "Как ты реагируешь, когда кто-то из твоего окружения зарабатывает заметно больше тебя?",
    options: [
      ["A", "Восхищение и растерянность — как у них получается"],
      ["B", "Смешанные чувства: рада за них, но тревожусь за свою нестабильность"],
      ["C", "Раздражение на себя — у меня есть всё для этого, но что-то держит"]
    ]
  },
  {
    q: "Что происходит в теле, когда думаешь о крупной цифре дохода?",
    options: [
      ["A", "Волнение и неуверенность"],
      ["B", "Напряжение — будто жду подвоха"],
      ["C", "Зажим, будто «нельзя», хотя объяснить причину не могу"]
    ]
  },
  {
    q: "Как давно ты думаешь о смене работы, ниши, должности или формата дохода — но не решаешься?",
    options: [
      ["A", "Постоянно думаю, но боюсь сделать первый шаг"],
      ["B", "Периодически — когда особенно тяжело, а потом снова терплю"],
      ["C", "Думаю давно, годами — но «привычное» удерживает сильнее, чем хочется признавать"]
    ]
  },
  {
    q: "Что для тебя сейчас самое трудное в теме денег?",
    options: [
      ["A", "Начать действовать и поверить, что у меня получится"],
      ["B", "Перестать бояться, что всё снова обрушится"],
      ["C", "Разрешить себе больше и снять невидимый потолок"]
    ]
  },
  {
    q: "Если бы денежный блок исчез уже завтра, что изменилось бы в первую очередь?",
    options: [
      ["A", "Появилась бы уверенность и первые результаты в новом деле"],
      ["B", "Доход стал бы стабильным, без качелей и тревоги"],
      ["C", "Доход вырос бы кратно, не упираясь в потолок"]
    ]
  }
];

const results = {
  A: {
    eyebrow: "Твой результат",
    title: "Тебе мешает страх первого шага",
    body: [
      "Ты хочешь зарабатывать больше — своим делом, новой должностью, сменой профессии — но пока не решилась сделать первые уверенные шаги. Внутри — сомнения: «а вдруг не получится», «а вдруг я недостаточно хороша», «с чего вообще начать». Это не значит, что у тебя нет ресурса — скорее всего, ты даже не подозреваешь, сколько сильных сторон уже есть, просто их пока заслоняют неосознаваемые блоки и запреты на деньги.",
      "Часто за этим стоит не отсутствие навыков, а денежный сценарий, записанный на уровне подсознания — например, установка, что зарабатывать «не для меня» или «сначала нужно стать идеальной». Пока этот сценарий не осознан, любые попытки начать будут упираться в один и тот же внутренний тормоз."
    ],
    tip: "Выпиши 5 своих сильных сторон — без «но» и обесценивания. Это первый шаг к тому, чтобы увидеть ресурс, который у тебя уже есть."
  },
  B: {
    eyebrow: "Твой результат",
    title: "Тебе мешает тревога за стабильность",
    body: [
      "У тебя есть доход — но стабильности как будто не существует. То всё хорошо, то внезапно тревожно за деньги, и снова мысль: «а вдруг их больше не будет». Это касается и тех, у кого доход буквально скачет, и тех, у кого зарплата формально стабильна, но внутреннее ощущение безопасности с деньгами всё равно отсутствует. Эти качели выматывают сильнее, чем нехватка денег как таковая.",
      "За таким сценарием почти всегда стоит подсознательный страх потери денег — психика будто не даёт расслабиться и довериться стабильности, даже если она есть. Вопрос не в том, умеешь ли ты зарабатывать — ты явно умеешь. Вопрос в том, что не даёт этому ощущению закрепиться."
    ],
    tip: "В следующий раз, когда почувствуешь тревогу за деньги, вместо привычного «опять всё пропало» — задай себе вопрос: «когда в жизни я в последний раз чувствовала, что иметь стабильно — небезопасно?». Просто заметь ответ."
  },
  C: {
    eyebrow: "Твой результат",
    title: "Тебе мешает невидимый потолок",
    body: [
      "У тебя есть результаты, компетенции, стаж — но доход упрямо не растёт выше одной и той же суммы, сколько бы ты ни старалась. Возможно, ты годами думаешь о повышении или смене работы, но каждый раз находится причина остаться. Или ты ведёшь своё дело, но избегаешь по-настоящему показывать себя — свои результаты, цену, лицо.",
      "За финансовым потолком почти всегда стоит не нехватка стратегии, а страх проявленности и внутренние запреты на «больше», спрятанные в убеждениях, которые ты, скорее всего, даже не осознаёшь как связанные с деньгами."
    ],
    tip: "Заметь, где именно ты «притормаживаешь» — не договариваешь результат на переговорах о зарплате, снижаешь цену раньше, чем спросили, откладываешь разговор о повышении «на потом». Это и есть точка, где живёт потолок."
  }
};

const answers = {};
const listEl = document.getElementById('questionsList');

questions.forEach((item, qi) => {
  const qDiv = document.createElement('div');
  qDiv.className = 'question';
  qDiv.innerHTML = `
    <p class="q-num">Вопрос ${qi + 1} из ${questions.length}</p>
    <p class="q-text">${item.q}</p>
    <div class="options"></div>
  `;
  const optsDiv = qDiv.querySelector('.options');
  item.options.forEach(([letter, text], oi) => {
    const label = document.createElement('label');
    label.className = 'option';
    label.innerHTML = `<input type="radio" name="q${qi}" value="${letter}"><span>${text}</span>`;
    label.addEventListener('click', () => {
      answers[qi] = letter;
      optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      label.classList.add('selected');
      updateProgress();
    });
    optsDiv.appendChild(label);
  });
  listEl.appendChild(qDiv);
});

function updateProgress(){
  const count = Object.keys(answers).length;
  const pct = Math.round((count / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Отвечено: ${count} из ${questions.length}`;
  const btn = document.getElementById('submitBtn');
  const hint = document.getElementById('hintText');
  if (count === questions.length){
    btn.disabled = false;
    hint.textContent = 'Готово — можно смотреть результат';
  } else {
    btn.disabled = true;
    hint.textContent = 'Ответь на все вопросы, чтобы увидеть результат';
  }
}

document.getElementById('submitBtn').addEventListener('click', () => {
  const tally = {A:0, B:0, C:0};
  Object.values(answers).forEach(letter => tally[letter]++);
  let winner = 'A';
  let max = -1;
  ['A','B','C'].forEach(letter => {
    if (tally[letter] > max){ max = tally[letter]; winner = letter; }
  });
  showResult(results[winner]);
});

function showResult(r){
  const bodyHtml = r.body.map(p => `<p>${p}</p>`).join('');
  document.getElementById('result').innerHTML = `
    <p class="result-eyebrow">${r.eyebrow}</p>
    <h2 class="result-title">${r.title}</h2>
    <div class="result-body">${bodyHtml}</div>
    <div class="result-tip">
      <span class="tip-label">Что можно сделать уже сейчас</span>
      <p>${r.tip}</p>
    </div>
    <div class="cta-block">
      <p>Узнала свой блок — это уже половина пути. Вторая половина — разобрать именно твою ситуацию и понять, что конкретно с ней делать.</p>
      <p>Напиши мне кодовое слово <span class="code">«ХОЧУ РАЗБОР»</span> — созвонимся индивидуально и разберём твой случай.</p>
      <a class="cta-link" href="https://vk.ru/nikitina_neiro" target="_blank" rel="noopener">Написать в личные сообщения</a>
    </div>
    <button class="restart" id="restartBtn">Пройти тест заново</button>
  `;
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  window.scrollTo({top: 0, behavior: 'smooth'});
  document.getElementById('restartBtn').addEventListener('click', () => {
    Object.keys(answers).forEach(k => delete answers[k]);
    document.querySelectorAll('input[type=radio]').forEach(i => i.checked = false);
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    updateProgress();
    document.getElementById('result').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
}
</script>
</body>
</html>
